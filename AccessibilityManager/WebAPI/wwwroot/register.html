<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="utf-8" />
    <title>Registracija</title>
    <link rel="stylesheet" href="/css/auth.css?v=1.0" />
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create an account</h1>
                <p>Join the community</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-field">
                    <label for="firstName">First name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="npr. Ivan"/>
                    <span id="firstNameError" class="text-danger"></span>
                </div>

                <div class="form-field">
                    <label for="lastName">Last name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="npr. Horvat" />
                    <span id="lastNameError" class="text-danger"></span>
                </div>

                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="korisnik123" />
                    <span id="usernameError" class="text-danger"></span>
                </div>

                <div class="form-field">
                    <label for="email">Email address</label>
                    <input type="text" id="email" name="email" placeholder="ivan@example.com" />
                    <span id="emailError" class="text-danger"></span>
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••"/>
                    <span id="passwordError" class="text-danger"></span>
                </div>

                <div class="form-field">
                    <label for="confirmPassword">Confirm password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"/>
                    <span id="confirmError" class="text-danger"></span>
                </div>

                <button type="submit" class="btn-primary">Register</button>
            </form>

            <div class="auth-footer">
                Već imate račun? <a href="/login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
